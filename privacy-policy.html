<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>티글 개인정보 처리방침</title>
    <!-- Markdown 렌더링 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
            color: #333;
        }
    </style>
</head>
<body>
    <div id="content">불러오는 중...</div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBr3x6iVPLBFAROn-LQdgLtCNFG87yaKRY",
            authDomain: "tigeul-716c6.firebaseapp.com",
            databaseURL: "https://tigeul-716c6-default-rtdb.firebaseio.com/",
            projectId: "tigeul-716c6",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const snapshot = await get(ref(db, "privacy_policy/0/content"));
        if (snapshot.exists()) {
            document.getElementById("content").innerHTML = marked.parse(snapshot.val());
        } else {
            document.getElementById("content").innerText = "내용을 불러올 수 없습니다.";
        }
    </script>
</body>
</html>
